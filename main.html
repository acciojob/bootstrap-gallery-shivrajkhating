<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cards Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .card {
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      height: 200px;
      object-fit: cover;
    }
  </style>
</head>
<body>

<div class="container my-5">
  <h2 class="text-center mb-4">Cards Gallery</h2>

  <div class="row g-4">

    <!-- Card 1 -->
    <div class="col-md-4 col-sm-6">
      <div class="card text-center">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image1.jpg" 
             class="card-img-top" 
             data-bs-toggle="modal" 
             data-bs-target="#lightboxModal"
             onclick="openLightbox(this.src)">
        <div class="card-body">
          <h6 class="card-title">Mountain View</h6>
          <p class="card-text">Beautiful snowy mountain landscape.</p>
        </div>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="col-md-4 col-sm-6">
      <div class="card text-center">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image2.jpg" 
             class="card-img-top"
             data-bs-toggle="modal" 
             data-bs-target="#lightboxModal"
             onclick="openLightbox(this.src)">
        <div class="card-body">
          <h6 class="card-title">Lake Forest</h6>
          <p class="card-text">Peaceful lake between green hills.</p>
        </div>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="col-md-4 col-sm-6">
      <div class="card text-center">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image3.jpg" 
             class="card-img-top"
             data-bs-toggle="modal" 
             data-bs-target="#lightboxModal"
             onclick="openLightbox(this.src)">
        <div class="card-body">
          <h6 class="card-title">Golden Field</h6>
          <p class="card-text">Wide golden landscape under sky.</p>
        </div>
      </div>
    </div>

    <!-- Card 4 -->
    <div class="col-md-4 col-sm-6">
      <div class="card text-center">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image4.jpg" 
             class="card-img-top"
             data-bs-toggle="modal" 
             data-bs-target="#lightboxModal"
             onclick="openLightbox(this.src)">
        <div class="card-body">
          <h6 class="card-title">Blue Lake</h6>
          <p class="card-text">Crystal clear lake with mountains.</p>
        </div>
      </div>
    </div>

    <!-- Card 5 -->
    <div class="col-md-4 col-sm-6">
      <div class="card text-center">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image5.jpg" 
             class="card-img-top"
             data-bs-toggle="modal" 
             data-bs-target="#lightboxModal"
             onclick="openLightbox(this.src)">
        <div class="card-body">
          <h6 class="card-title">Island Cliff</h6>
          <p class="card-text">Cliff view over the ocean.</p>
        </div>
      </div>
    </div>

    <!-- Card 6 -->
    <div class="col-md-4 col-sm-6">
      <div class="card text-center">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image6.jpg" 
             class="card-img-top"
             data-bs-toggle="modal" 
             data-bs-target="#lightboxModal"
             onclick="openLightbox(this.src)">
        <div class="card-body">
          <h6 class="card-title">City Skyline</h6>
          <p class="card-text">Modern city view at sunset.</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Lightbox Modal -->
<div class="modal fade" id="lightboxModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content bg-transparent border-0">
      <div class="modal-body text-center">
        <img id="lightboxImage" class="img-fluid rounded">
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  function openLightbox(src) {
    document.getElementById("lightboxImage").src = src;
  }
</script>

</body>
</html>
